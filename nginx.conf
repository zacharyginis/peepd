worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Use /tmp for all write paths so the container can run as non-root
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path       /tmp/proxy_temp;
  fastcgi_temp_path     /tmp/fastcgi_temp;
  uwsgi_temp_path       /tmp/uwsgi_temp;
  scgi_temp_path        /tmp/scgi_temp;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile        on;
  tcp_nopush      on;
  keepalive_timeout 65;
  server_tokens   off;

  # ── Compression ──────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css text/javascript application/javascript
    application/json image/svg+xml font/woff font/woff2;

  server {
    # Cloud Run injects $PORT (default 8080); we use 8080 directly.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https:; font-src 'self' https://cdnjs.cloudflare.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://graph.facebook.com https://api.linkedin.com;" always;

    # ── Cache: long-lived assets (CSS, JS, images, fonts) ─────────────────────
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|webp|woff|woff2|ttf|otf)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
      access_log off;
    }

    # ── Cache: HTML — always revalidate ───────────────────────────────────────
    location ~* \.html$ {
      expires -1;
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Serve each named HTML page directly ───────────────────────────────────
    location = /               { try_files /index.html =404; }
    location = /profile        { try_files /profile.html =404; }
    location = /write-review   { try_files /write-review.html =404; }
    location = /privacy-policy { try_files /privacy-policy.html =404; }
    location = /terms          { try_files /terms-of-service.html =404; }
    location = /cookies        { try_files /cookie-policy.html =404; }
    location = /my-profile     { try_files /my-profile.html =404; }
    location = /how-it-works   { try_files /how-it-works.html =404; }
    location = /careers        { try_files /careers.html =404; }

    # ── Default: try file, then .html extension, then 404 ────────────────────
    location / {
      try_files $uri $uri/ $uri.html /profile.html;
    }

    # ── Health-check endpoint for Cloud Run ───────────────────────────────────
    location = /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # ── Custom 404 ────────────────────────────────────────────────────────────
    error_page 404 /index.html;
  }
}
