<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 116">
  <!--
    Stem: full-height bar, x=8..23 (right edge=23).
    Ring: outer r=33, center cx=56 → left edge=56-33=23 = stem right edge.
    Perfect tangent — no gap, no ugly overlap.
  -->
  <!-- Full-height stem (ascender + descender) -->
  <rect x="8" y="0" width="15" height="116" rx="7.5" fill="#161616"/>
  <!-- Bowl ring: outer r=33, inner r=20, centered at (56,38) -->
  <path fill-rule="evenodd" fill="#161616"
    d="M56,38 m-33,0 a33,33,0,1,0,66,0 a33,33,0,1,0,-66,0
       M56,38 m-20,0 a20,20,0,1,0,40,0 a20,20,0,1,0,-40,0"/>
  <!-- Orange center dot -->
  <circle cx="56" cy="38" r="9" fill="#E05527"/>
</svg>
