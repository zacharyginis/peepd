<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 195 260">
  <!--
    STROKE-BASED approach — ring and stem share identical stroke-width.
    Stem centerline x = cx - r = 107 - 72 = 35.
    This places:
      stem left  edge = 35 - 11 = 24  = circle outer-left (107 - 72 - 11 = 24) ✓
      stem right edge = 35 + 11 = 46  = circle inner-left (107 - 72 + 11 = 46) ✓
    Stem exits/enters ring flush — no gap, no overlap into the hole.
  -->
  <!-- Descender stem -->
  <line x1="35" y1="82" x2="35" y2="248"
        stroke="#161616" stroke-width="22" stroke-linecap="round"/>
  <!-- Ring -->
  <circle cx="107" cy="82" r="72"
          fill="none" stroke="#161616" stroke-width="22"/>
  <!-- Orange dot -->
  <circle cx="107" cy="82" r="23" fill="#E05527"/>
</svg>
